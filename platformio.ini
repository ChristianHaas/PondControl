; PlatformIO Project Configuration File
; PondControl — ESP32 pond monitoring & feeding controller
; Based on Cooler project structure

[env:az-delivery-devkit-v4]
platform = espressif32
board = az-delivery-devkit-v4
framework = arduino
monitor_speed = 115200
upload_resetmethod = nodemcu
lib_deps =
	bblanchon/ArduinoJson@^7.3.0
	paulstoffregen/OneWire@^2.3.7
	milesburton/DallasTemperature@^3.11.0
	ayushsharma82/ElegantOTA@^3.1.0
	esp32async/AsyncTCP@^3.4.9
lib_extra_dirs = C:/Users/haasg/OneDrive/Arduino/MyLibraries
build_flags = -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1

[env:az-delivery-devkit-v4-ota]
extends = env:az-delivery-devkit-v4
upload_protocol = espota
upload_port = 192.168.68.203
upload_flags = --auth=${sysenv.OTA_PASSWORD}
